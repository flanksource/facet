apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "facet.fullname" . }}
  labels:
    {{- include "facet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "facet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "facet.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["facet"]
          args:
            - serve
            - --port
            - {{ .Values.service.port | quote }}
            - --templates-dir
            - {{ .Values.facet.templatesDir }}
            - --workers
            - {{ .Values.facet.workers | quote }}
            - --timeout
            - {{ .Values.facet.timeout | quote }}
            {{- if .Values.facet.verbose }}
            - --verbose
            {{- end }}
            {{- if .Values.sandbox.enabled }}
            - --sandbox
            - {{ .Values.sandbox.settingsPath }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- if .Values.sandbox.enabled }}
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: srt-settings
              mountPath: /etc/facet
              readOnly: true
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.sandbox.enabled }}
      volumes:
        - name: srt-settings
          configMap:
            name: {{ include "facet.fullname" . }}-srt-settings
      {{- end }}
