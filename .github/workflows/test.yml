name: Test

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json

      - name: Setup Bun
        uses: flanksource/deps@v1.0.24
        with:
          tools: bun@v1.3.10

      - name: Install dependencies
        run: cd cli && npm install

      - name: Run tests
        run: cd cli && bun test

      - name: Build
        run: cd cli && npm run build:lib
