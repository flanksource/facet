name: Test

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json

      - name: Setup tools
        uses: flanksource/deps@v1.0.24
        with:
          tools: bun@v1.3.10,task@v3.39.2
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick poppler-utils libnss3-tools
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true
          magick -version || convert -version
          pdfinfo -v 2>&1 || true
          certutil --version 2>&1 || true

      - name: Install dependencies
        run: |
          npm install
          cd cli && npm install

      - name: Run tests
        run: task test:unit

      - name: Build
        run: cd cli && npm run build:lib
