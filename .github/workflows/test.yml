name: Test

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            cli/pnpm-lock.yaml

      - name: Setup tools
        uses: flanksource/deps@1c71b668cbb01ac7df430538c3023e6c934ec510 # v1.0.24
        with:
          tools: task@v3.39.2
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick poppler-utils libnss3-tools
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true
          magick -version || convert -version
          pdfinfo -v 2>&1 || true
          certutil --version 2>&1 || true

      - name: Install dependencies
        run: |
          pnpm install
          cd cli && pnpm install

      - name: Typecheck
        run: cd cli && pnpm run lint

      - name: Run tests
        run: task test:unit

      - name: Build (library + SEA binary)
        run: cd cli && pnpm run build

      - name: Smoke-test the binary
        run: ./dist/facet --version
