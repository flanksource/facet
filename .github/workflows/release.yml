name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          cd cli
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          cd ..

          # Update root package.json version to match
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version

          git add cli/package.json package.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

  build-binaries:
    name: Build Binary (${{ matrix.platform }}-${{ matrix.arch }})
    needs: version-bump
    runs-on: ${{ matrix.os }}
    # Node SEA embeds the host's node binary, so each target builds on a native
    # runner (no cross-compilation, unlike bun --compile).
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            ext: ""
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: ""
          - os: windows-latest
            platform: windows
            arch: x64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: cd cli && pnpm install --frozen-lockfile

      - name: Build CLI binary (Node SEA)
        shell: bash
        run: |
          cd cli && pnpm run build:cli && cd ..
          mv "dist/facet${{ matrix.ext }}" "dist/facet-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}"

      - name: Smoke-test the binary
        shell: bash
        run: ./dist/facet-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }} --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: facet-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/facet-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    # Depend on the publish jobs so a binary is never released without its
    # matching npm packages: @flanksource/facet (component library the CLI
    # installs at render time) and @flanksource/facet-cli (the CLI launcher +
    # per-platform binary packages). A release/npm version skew would break
    # `facet pdf` for every consumer.
    needs: [version-bump, build-binaries, publish-npm, publish-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: binaries

      - name: Display structure of downloaded files
        run: ls -R binaries

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.version-bump.outputs.new_tag }} \
            --repo ${{ github.repository }} \
            --title "Release ${{ needs.version-bump.outputs.new_tag }}" \
            --notes "Release ${{ needs.version-bump.outputs.new_version }}" \
            binaries/facet-linux-x64/facet-linux-x64 \
            binaries/facet-linux-arm64/facet-linux-arm64 \
            binaries/facet-macos-arm64/facet-macos-arm64 \
            binaries/facet-windows-x64/facet-windows-x64.exe

  build-image-and-chart:
    name: Build Image and Publish Chart
    # The tag is pushed with GITHUB_TOKEN, which does not trigger helm-release.yml's
    # push event. Dispatch it explicitly against the tag so the docker build and chart
    # publish run only after the release exists, with github.ref pointing at the tag.
    needs: [version-bump, create-release]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch Docker and Helm Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run helm-release.yml \
            --repo ${{ github.repository }} \
            --ref ${{ needs.version-bump.outputs.new_tag }}

  publish-npm:
    name: Publish to npm
    needs: [version-bump, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm
        run: npm install -g --force npm@11.11.0

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd cli
          pnpm install --frozen-lockfile

      - name: Build library
        run: cd cli && pnpm run gen-version && pnpm run build:lib

      - name: Publish to npm
        run: npm publish --access public --provenance

  publish-cli:
    name: Publish CLI to npm
    needs: [version-bump]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm
        run: npm install -g --force npm@11.11.0

      - name: Install dependencies
        run: cd cli && pnpm install --frozen-lockfile

      - name: Build CLI bundle
        run: cd cli && pnpm run build:bundle

      - name: Assemble npm package
        env:
          NEW_VERSION: ${{ needs.version-bump.outputs.new_version }}
        run: node cli/scripts/pack-npm-cli.cjs "$NEW_VERSION" npm-dist

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm-dist && npm publish --access public --provenance
