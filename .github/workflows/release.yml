name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          cd cli
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          cd ..

          # Keep the root library (@flanksource/facet) version in lockstep with the CLI.
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version

          git add cli/package.json package.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

  build-binaries:
    name: Build Binary (${{ matrix.platform }}-${{ matrix.arch }})
    needs: version-bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux, arch: x64, target: bun-linux-x64 }
          - { os: ubuntu-latest, platform: linux, arch: arm64, target: bun-linux-arm64 }
          - { os: macos-latest, platform: macos, arch: arm64, target: bun-darwin-arm64 }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: flanksource/deps@v1.0.24
        with:
          tools: bun@v1.3.10
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd cli
          pnpm install --frozen-lockfile

      - name: Build standalone binary
        env:
          BUN_TARGET: ${{ matrix.target }}
          BIN_OUT: ../dist/facet-${{ matrix.platform }}-${{ matrix.arch }}
        run: |
          cd cli
          pnpm run gen-version
          pnpm run build:bin
          chmod +x ../dist/facet-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: facet-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/facet-${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [version-bump, publish-npm, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.version-bump.outputs.new_tag }} \
            --repo ${{ github.repository }} \
            --title "Release ${{ needs.version-bump.outputs.new_tag }}" \
            --notes "Release ${{ needs.version-bump.outputs.new_version }}

          Install the CLI with: \`npm install -g @flanksource/facet-cli@${{ needs.version-bump.outputs.new_version }}\`

          Or download a standalone binary below (requires pnpm and a system Chrome/Chromium at runtime)." \
            binaries/facet-linux-x64/facet-linux-x64 \
            binaries/facet-linux-arm64/facet-linux-arm64 \
            binaries/facet-macos-arm64/facet-macos-arm64

  build-image-and-chart:
    name: Build Image and Publish Chart
    # The tag is pushed with GITHUB_TOKEN, which does not trigger helm-release.yml's
    # push event. Dispatch it explicitly against the tag so the docker build and chart
    # publish run only after the release exists, with github.ref pointing at the tag.
    needs: [version-bump, create-release]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch Docker and Helm Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run helm-release.yml \
            --repo ${{ github.repository }} \
            --ref ${{ needs.version-bump.outputs.new_tag }}

  publish-npm:
    name: Publish to npm
    needs: [version-bump, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm
        run: npm install -g --force npm@11.11.0

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd cli
          pnpm install --frozen-lockfile

      - name: Build library
        run: |
          pnpm run build:components
          pnpm run build:css
          cd cli && pnpm run gen-version && pnpm run build:lib

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Publish @flanksource/facet-cli
        run: cd cli && npm publish --access public --provenance
