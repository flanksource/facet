name: Helm Chart Test

on:
  push:
    branches: [main]
    paths:
      - "chart/**"
      - "ct.yaml"
      - "Dockerfile"
      - ".github/workflows/helm-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "chart/**"
      - "ct.yaml"
      - "Dockerfile"
      - ".github/workflows/helm-test.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint chart/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: chart/test/go.sum

      - uses: azure/setup-helm@v4

      - uses: helm/kind-action@v1
        with:
          cluster_name: ct

      - name: Build and load image into Kind
        run: |
          docker build -t ghcr.io/flanksource/facet:test .
          kind load docker-image ghcr.io/flanksource/facet:test --name ct

      - name: Run e2e tests
        working-directory: chart/test
        env:
          IMAGE_TAG: test
        run: go test -v -timeout 15m ./...

      - name: Debug pod logs on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -A -o wide
          echo "=== Pod describe ==="
          kubectl describe pods -l app.kubernetes.io/name=facet -A
          echo "=== Pod logs ==="
          kubectl logs -l app.kubernetes.io/name=facet -A --tail=100 || true
